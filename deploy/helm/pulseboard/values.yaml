# PulseBoard Helm values.
#
# Privacy posture matches the compose stack: no Ingress, no LoadBalancer —
# everything is ClusterIP and reached via `kubectl port-forward`. This chart
# targets a small home-lab (typically single-node) cluster.

pulseboard:
  image:
    # No public image is published: build it yourself (`docker build -t pulseboard:0.1.0 .`)
    # and push it to your registry or load it into the cluster (e.g. `kind load docker-image`).
    repository: pulseboard
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }
  persistence:
    size: 1Gi
    storageClassName: ""

prometheus:
  image:
    repository: prom/prometheus
    tag: v2.53.0
  scrapeIntervalSeconds: 60
  retention: 30d
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 512Mi }
  persistence:
    size: 2Gi
    storageClassName: ""

# Optional weekly report CronJob (disabled by default). When enabled it runs
# `python -m pulseboard.report --notify` on the schedule below, reading the
# pulseboard PVC read-only. Put the notification env vars
# (PULSEBOARD_NTFY_URL, PULSEBOARD_NTFY_TOPIC, PULSEBOARD_NTFY_TOKEN,
# PULSEBOARD_TELEGRAM_BOT_TOKEN, PULSEBOARD_TELEGRAM_CHAT_ID) in a Secret and
# reference it via notifySecret.
report:
  enabled: false
  schedule: "0 8 * * 1" # Monday 08:00
  notifySecret: "" # name of a Secret with the PULSEBOARD_* notification keys
  # Optional AI coach config (docs/AI_COACH.md): name of a Secret holding
  # PULSEBOARD_AI_PROVIDER, PULSEBOARD_AI_MODEL, PULSEBOARD_OLLAMA_URL and/or
  # one PULSEBOARD_*_API_KEY. Kept separate from notifySecret so the two can
  # be rotated/owned independently; both may be set.
  aiSecret: ""
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 128Mi }

grafana:
  image:
    repository: grafana/grafana
    tag: 11.6.3
  adminUser: admin
  adminPassword: admin # change this; or better, pre-create a secret and set existingSecret
  existingSecret: "" # name of a Secret with keys admin-user and admin-password
  installPlugins: frser-sqlite-datasource
  # Grafana mounts the pulseboard PVC read-only for the SQLite history panels.
  # With a ReadWriteOnce volume both pods must land on the same node, so the
  # chart adds a required podAffinity to the pulseboard pod. Disable only if
  # your storage class supports ReadWriteMany.
  coScheduleWithApp: true
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 512Mi }
  persistence:
    size: 1Gi
    storageClassName: ""
