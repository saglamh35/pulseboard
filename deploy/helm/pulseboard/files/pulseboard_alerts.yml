apiVersion: 1

groups:
  - orgId: 1
    name: pulseboard-daily
    folder: PulseBoard Alerts
    interval: 5m
    rules:
      - uid: pb-rhr-rising
        title: Resting heart rate rising 3+ days
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: pulseboard_resting_heart_rate_rising_days, instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2.5] }
        annotations:
          summary: Daily resting heart rate has increased for 3 or more consecutive days.
          description: Informational trend signal, not medical advice. See docs/ALERTING.md.
        labels:
          severity: info

      - uid: pb-sleep-low
        title: 7-day average sleep below 6.5h
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: pulseboard_sleep_hours_7d_avg, instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [6.5] }
        annotations:
          summary: Rolling 7-day sleep average dropped below 6.5 hours.
          description: Informational trend signal, not medical advice. See docs/ALERTING.md.
        labels:
          severity: info

      - uid: pb-steps-low
        title: 7-day average steps below 5000
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: pulseboard_steps_7d_avg, instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [5000] }
        annotations:
          summary: Rolling 7-day step average dropped below 5000.
          description: Informational trend signal, not medical advice. See docs/ALERTING.md.
        labels:
          severity: info

      # noDataState: OK keeps a brand-new install quiet before the first
      # ingest; `python -m pulseboard.doctor` covers that gap.
      - uid: pb-data-stale
        title: No new health data for 2 days
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: time() - pulseboard_latest_data_timestamp_seconds, instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [172800] }
        annotations:
          summary: The newest stored data day is more than 2 days old — the phone likely stopped syncing.
          description: Check the Shortcut/Health Auto Export automation; see docs/SHORTCUT.md and docs/ALERTING.md.
        labels:
          severity: warning

      - uid: pb-rhr-anomaly
        title: Resting heart rate unusually high vs 30-day baseline
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: 'pulseboard_zscore{metric="resting_heart_rate"}', instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2.5] }
        annotations:
          summary: Today's resting heart rate is more than 2.5 standard deviations above its 30-day baseline.
          description: Informational anomaly signal, not medical advice. See docs/INSIGHTS.md and docs/ALERTING.md.
        labels:
          severity: info

      - uid: pb-hrv-anomaly
        title: HRV unusually low vs 30-day baseline
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: 'pulseboard_zscore{metric="heart_rate_variability_sdnn"}', instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [-2.5] }
        annotations:
          summary: Today's HRV (SDNN) is more than 2.5 standard deviations below its 30-day baseline.
          description: Informational anomaly signal, not medical advice. See docs/INSIGHTS.md and docs/ALERTING.md.
        labels:
          severity: info

      - uid: pb-score-low
        title: Health score below 50
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { expr: pulseboard_health_score, instant: true, refId: A }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [50] }
        annotations:
          summary: Composite health score dropped below 50.
          description: Informational trend signal, not medical advice. See docs/ALERTING.md and docs/SCORE.md.
        labels:
          severity: info
