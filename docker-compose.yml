# All ports are bound to 127.0.0.1 on purpose: this stack serves personal
# health data and must never be reachable from outside the host.
services:
  pulseboard:
    build: .
    container_name: pulseboard
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - pulseboard-data:/data
    environment:
      # Optional AI coach (docs/AI_COACH.md). Values come from the host env or
      # a git-ignored .env file — never hardcode API keys here.
      - PULSEBOARD_AI_PROVIDER=${PULSEBOARD_AI_PROVIDER:-}
      - PULSEBOARD_AI_MODEL=${PULSEBOARD_AI_MODEL:-}
      - PULSEBOARD_OLLAMA_URL=${PULSEBOARD_OLLAMA_URL:-http://ollama:11434}
      - PULSEBOARD_ANTHROPIC_API_KEY=${PULSEBOARD_ANTHROPIC_API_KEY:-}
      - PULSEBOARD_OPENAI_API_KEY=${PULSEBOARD_OPENAI_API_KEY:-}
      - PULSEBOARD_GEMINI_API_KEY=${PULSEBOARD_GEMINI_API_KEY:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pulseboard-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.3
    container_name: pulseboard-grafana
    environment:
      # SQLite datasource plugin for the long-term history panels.
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      # Uncomment (and set) to push severity=warning alerts to an ntfy topic;
      # see grafana/provisioning/alerting/contactpoints.yml.
      # - PULSEBOARD_NTFY_URL=${PULSEBOARD_NTFY_URL}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/pulseboard_dashboard.json:/var/lib/grafana/dashboards/pulseboard_dashboard.json:ro
      # Read-only view of the SQLite file for the Grafana SQLite datasource
      # (long-term history panels query it directly).
      - pulseboard-data:/data:ro
    restart: unless-stopped

  # Optional weekly-report sidecar: `docker compose --profile reports up -d`.
  # Emits the report every Monday 08:00 (container-local time) and pushes a
  # summary via ntfy/Telegram when the PULSEBOARD_* env vars are set.
  # Reading the SQLite file from a second process is safe here: the reporter
  # only reads, and writes from the API are short transactions.
  reporter:
    build: .
    container_name: pulseboard-reporter
    profiles: ["reports"]
    command:
      ["python", "-m", "pulseboard.report", "--loop", "--notify", "--out", "/data/reports/"]
    volumes:
      - pulseboard-data:/data
    environment:
      - PULSEBOARD_NTFY_URL=${PULSEBOARD_NTFY_URL:-}
      - PULSEBOARD_NTFY_TOPIC=${PULSEBOARD_NTFY_TOPIC:-}
      - PULSEBOARD_NTFY_TOKEN=${PULSEBOARD_NTFY_TOKEN:-}
      - PULSEBOARD_TELEGRAM_BOT_TOKEN=${PULSEBOARD_TELEGRAM_BOT_TOKEN:-}
      - PULSEBOARD_TELEGRAM_CHAT_ID=${PULSEBOARD_TELEGRAM_CHAT_ID:-}
      # Optional AI coach section in the weekly report (docs/AI_COACH.md).
      - PULSEBOARD_AI_PROVIDER=${PULSEBOARD_AI_PROVIDER:-}
      - PULSEBOARD_AI_MODEL=${PULSEBOARD_AI_MODEL:-}
      - PULSEBOARD_OLLAMA_URL=${PULSEBOARD_OLLAMA_URL:-http://ollama:11434}
      - PULSEBOARD_ANTHROPIC_API_KEY=${PULSEBOARD_ANTHROPIC_API_KEY:-}
      - PULSEBOARD_OPENAI_API_KEY=${PULSEBOARD_OPENAI_API_KEY:-}
      - PULSEBOARD_GEMINI_API_KEY=${PULSEBOARD_GEMINI_API_KEY:-}
    restart: unless-stopped

  # Optional local LLM for the AI coach: `docker compose --profile ai up -d`,
  # then pull the model once: `docker compose exec ollama ollama pull gemma3:4b`
  # and set PULSEBOARD_AI_PROVIDER=ollama. Local-first: health data never
  # leaves the machine. See docs/AI_COACH.md.
  ollama:
    image: ollama/ollama:0.9.6
    container_name: pulseboard-ollama
    profiles: ["ai"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  pulseboard-data:
  prometheus-data:
  grafana-data:
  ollama-models:
